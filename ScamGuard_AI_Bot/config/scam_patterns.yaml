# ============================================
# URL PATTERNS
# Suspicious URL characteristics
# ============================================

suspicious_url_patterns:
  weight: 0.4
  patterns:
    - "bit\\.ly/"
    - "tinyurl\\.com/"
    - "t\\.co/"
    - "goo\\.gl/"
    - "rb\\.gy/"
    - "is\\.gd/"
    - "shorturl\\.at/"
    - "\\.xyz/"
    - "\\.top/"
    - "\\.click/"
    - "\\.loan/"
    - "\\.work/"
    - "login.*\\.php"
    - "verify.*\\.html"
    - "secure.*account"
    - "paypal.*\\.(?!com)"
    - "amazon.*\\.(?!com|co\\.uk)"
    - "apple.*\\.(?!com)"
    - "microsoft.*\\.(?!com)"

# ============================================
# MESSAGE STRUCTURE PATTERNS
# Structural indicators of scam messages
# ============================================

structure_indicators:
  excessive_caps:
    weight: 0.1
    description: "More than 30% of message is uppercase"
    threshold: 0.3
  
  excessive_emojis:
    weight: 0.1
    description: "More than 10 emojis in a message"
    threshold: 10
  
  excessive_exclamation:
    weight: 0.1
    description: "More than 3 exclamation marks"
    threshold: 3
  
  contains_phone_number:
    weight: 0.1
    description: "Message contains a phone number from unknown contact"
  
  contains_url:
    weight: 0.15
    description: "Message contains a URL from unknown contact"
  
  very_first_message_asks_for_info:
    weight: 0.3
    description: "First message immediately asks for personal information"

# ============================================
# WHITELISTED PATTERNS
# These reduce the scam score (indicate legitimacy)
# ============================================

legitimate_indicators:
  professional_greeting:
    weight: -0.2
    patterns:
      - "hi, i found your contact"
      - "we met at"
      - "referred by"
      - "your colleague"
      - "following up on"
      - "regarding our meeting"
  
  specific_context:
    weight: -0.3
    description: "Message references specific shared context or mutual connections"
  
  business_context:
    weight: -0.2
    patterns:
      - "regarding the project"
      - "about the proposal"
      - "meeting scheduled"
      - "interview"
      - "application"