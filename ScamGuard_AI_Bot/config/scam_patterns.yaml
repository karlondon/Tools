# ScamGuard AI Bot - Scam Pattern Database
# These patterns are used for fast rule-based detection (Layer 1)
# before AI analysis (Layer 2)

# ============================================
# KEYWORD PATTERNS
# Each pattern has a weight (0.0-1.0) that contributes to the scam score
# ============================================

urgency_keywords:
  weight: 0.3
  patterns:
    - "act now"
    - "urgent"
    - "immediately"
    - "last chance"
    - "expires today"
    - "limited time"
    - "don't delay"
    - "time sensitive"
    - "act fast"
    - "hurry"
    - "deadline"
    - "final notice"
    - "within 24 hours"
    - "account will be closed"
    - "suspended"

financial_keywords:
  weight: 0.4
  patterns:
    - "send money"
    - "wire transfer"
    - "western union"
    - "moneygram"
    - "bitcoin"
    - "cryptocurrency"
    - "investment opportunity"
    - "guaranteed returns"
    - "double your money"
    - "bank account details"
    - "routing number"
    - "gift card"
    - "itunes card"
    - "google play card"
    - "steam card"
    - "processing fee"
    - "advance fee"
    - "inheritance"
    - "lottery winner"
    - "you have won"
    - "claim your prize"
    - "million dollars"
    - "million pounds"
    - "unclaimed funds"

