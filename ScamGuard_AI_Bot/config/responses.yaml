# ScamGuard AI Bot - Response Templates
# Templates for time-wasting responses to scammers
# and polite responses for legitimate contacts

# ============================================
# LEGITIMATE CONTACT RESPONSES
# Polite auto-replies for genuine messages
# ============================================

legitimate_responses:
  initial_greeting:
    - "Hi there! Thanks for reaching out. I'm currently away but I've received your message. I'll get back to you as soon as I can. 🙂"
    - "Hello! Thank you for your message. I'm a bit busy at the moment but I'll respond properly soon."
    - "Hi! I got your message, thanks. I'll be in touch shortly - just need to free up some time."
    - "Thanks for getting in touch! I'm currently occupied but will reply to you soon. Appreciate your patience!"
    - "Hello! Just letting you know I've seen your message. I'll respond in detail when I'm available. Thanks!"

  follow_up:
    - "Just wanted to let you know I haven't forgotten about your message - I'll get back to you soon!"
    - "Still planning to reply properly - thanks for your patience!"

# ============================================
# SCAM TIME-WASTING RESPONSES
# Organized by scam type for contextual responses
# ============================================

scam_responses:
  # Generic opening responses to build engagement
  generic_engagement:
    - "Oh really? That sounds interesting, tell me more about this..."
    - "Wow, I wasn't expecting this! Can you explain a bit more?"
    - "Hmm interesting... I'm not very good with these things. Can you walk me through it step by step?"
    - "Oh my, this sounds important! What exactly do I need to do?"
    - "I'm a bit confused but intrigued. Could you explain it more simply?"

  # Advance-fee / lottery / inheritance scams
  advance_fee:
    initial:
      - "Oh wow, really?! I've never won anything before! This is so exciting! How does this work exactly?"
      - "An inheritance? That's incredible! I didn't know I had relatives abroad. Can you tell me more about who left this?"
      - "Millions?! Are you serious? I can't believe it! What do I need to do to claim this?"
    
    stalling:
      - "I'm trying to find my passport for the details you need but I think I left it at my mum's house. Can I get it tomorrow?"
      - "Sorry for the delay, my internet keeps cutting out. What was that form you needed me to fill out again?"
      - "I went to the bank today but they were closed early because of a holiday. I'll try again Monday."
      - "I'm having trouble with the form... it's asking for things I don't understand. What's an IBAN number?"
      - "My printer ran out of ink so I can't print the form. I've ordered some online but it won't arrive until Thursday."
      - "I asked my nephew to help me with the computer but he's busy this week. Can we do this next week?"
      - "Oh dear, I accidentally deleted your last email. Could you send all the instructions again from the beginning?"
    
    fake_compliance:
      - "OK I'm at the bank now. They're asking which branch to send it to - what's the branch name again?"
      - "I've got the gift cards! But I'm having trouble scratching off the back. The codes are really hard to read..."
      - "I sent the money but the receipt looks strange. The reference number is... hold on let me find my glasses..."

  # Phishing scams
  phishing:
    initial:
      - "Oh no! My account is compromised? That's terrible! I'm not very tech-savvy though... what should I do?"
      - "A security alert? I don't understand these tech things very well. Can you help me through it?"
    
    stalling:
      - "I clicked the link but it's just showing a white page. Is that right?"
      - "It's asking for my password but I can't remember which one I use. I have so many passwords written in a notebook somewhere..."
      - "My computer is doing that spinning wheel thing again. It's always so slow. Let me restart it and try again."
      - "I think I typed it in wrong. It says 'error'. What does error code 404 mean?"
      - "Wait, I need to put on my reading glasses. The text is so small on these screens..."
      - "My grandson set up this password for me and I can't remember it. He's at school right now though."
      - "I'm on the page now but there are so many buttons! Which one do I click? The blue one or the green one?"

  # Romance scams
  romance:
    initial:
      - "That's so sweet of you to say! Tell me more about yourself 😊"
      - "Aww, you seem like such a kind person. Where are you from originally?"
    
    stalling:
      - "I'd love to help but I've been having some financial difficulties myself lately... my car broke down and I need to save for repairs."
      - "You know, my friend was in a similar situation once. Have you tried contacting your embassy?"
      - "That sounds really tough. I wish I could help but I'm just a simple person with not much to spare."
      - "I was thinking about you. Tell me about your childhood - I want to know everything about you! 😊"
      - "I tried to look into sending money abroad but my bank said there are new regulations. Something about fraud prevention?"
      - "My financial advisor said I shouldn't send money to anyone I haven't met in person. Do you think we could meet?"

  # Tech support scams  
  tech_support:
    initial:
      - "A virus?! Oh no, I don't know anything about computers! Please help me!"
      - "My computer has a problem? I thought it was just being slow because it's old..."
    
    stalling:
      - "OK I'm trying to find the Start button... is it the big round one at the bottom?"
      - "It's asking me to type something but the keyboard isn't working... oh wait, I was typing in the wrong window."
      - "I right-clicked but nothing happened. Oh wait, I think I left-clicked. What's the difference again?"
      - "My screen just went blank! Oh no wait, the cat sat on the keyboard and turned the monitor off."
      - "I'm trying to download TeamViewer but it says I need to update my browser first. How do I do that?"
      - "I found something called 'Terminal' - is that what you mean? It has lots of scary writing in it."
      - "Oh no, I think I accidentally opened 15 copies of Internet Explorer. My computer is really slow now."
      - "The download says it will take 3 hours. My internet is very slow because I live in the countryside."

  # Investment / crypto scams
  investment:
    initial:
      - "Guaranteed returns? That does sound interesting. I've been thinking about investing my savings..."
      - "I've heard about Bitcoin but I don't really understand it. Is it like real money?"
    
    stalling:
      - "I'm trying to set up a Bitcoin wallet but it's asking for a 'seed phrase'. Is that like a gardening thing?"
      - "I told my financial advisor about this and they want to see the documents. Can you send me official paperwork?"
      - "I tried to buy Bitcoin at the post office but they looked at me funny. Where exactly do I buy it?"
      - "My bank app is saying 'transaction blocked for your protection'. What does that mean?"
      - "I've been reading about this and it sounds great. My only concern is... can you explain blockchain to me in simple terms?"

  # Job scams
  job_scam:
    initial:
      - "£5000 a week?! That sounds amazing! I've been looking for a new job. What's involved?"
      - "Work from home? That would be perfect for me! Tell me everything about this opportunity."
    
    stalling:
      - "I'm filling out the application but it's quite long. I'm on question 3 of 50. Can I finish it tomorrow?"
      - "Do I need to buy anything to get started? Because I just spent my budget on groceries this week..."
      - "I sent my CV but I think I attached the wrong file. It might have been my shopping list. Let me try again."
      - "My references are all from about 10 years ago, is that OK? Let me try to track down their current numbers."

# ============================================
# NOTIFICATION TEMPLATES  
# Messages sent to the bot owner
# ============================================

owner_notifications:
  scam_detected: |
    🚨 **SCAM DETECTED** 🚨
    
    **From**: {sender_name} ({sender_id})
    **Platform**: {platform}
    **Scam Score**: {scam_score:.0%}
    **Scam Type**: {scam_type}
    **Message**: {message_preview}
    
    ⏳ Bot is engaging the scammer in time-wasting mode.
    
    Reply with /block {sender_id} to block them.
    Reply with /release {sender_id} if this is legitimate.

  legitimate_message: |
    📩 **New Message from Unknown Contact**
    
    **From**: {sender_name} ({sender_id})
    **Platform**: {platform}
    **Legitimacy Score**: {legitimacy_score:.0%}
    **Message**: {message_text}
    
    ✅ Bot has sent an auto-reply saying you'll be in touch.
    
    Reply with /whitelist {sender_id} to add to contacts.
    Reply with /scam {sender_id} if this is actually a scam.

  uncertain_message: |
    ❓ **Uncertain Message - Needs Review**
    
    **From**: {sender_name} ({sender_id})
    **Platform**: {platform}
    **Scam Score**: {scam_score:.0%}
    **Message**: {message_text}
    
    Bot is holding response pending your review.
    
    Reply with /scam {sender_id} to engage in scam-wasting mode.
    Reply with /legit {sender_id} to send a polite auto-reply.

  scammer_report: |
    📋 **Scammer Reported**
    
    **Scammer**: {sender_name} ({sender_id})
    **Platform**: {platform}
    **Messages exchanged**: {message_count}
    **Time wasted**: {time_wasted}
    **Status**: Reported to {platform} abuse team