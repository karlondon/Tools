# Triage Rules Configuration
# Define keyword-based assignment rules for automatic ticket triage
#
# Rule Structure:
#   - keyword: The keyword to search for in ticket content (case-insensitive)
#     assignment_group: The ServiceNow assignment group name
#     priority: Rule evaluation order (lower = higher priority)
#     description: Human-readable description of the rule
#
# Notes:
# - Rules are evaluated in priority order (1, 2, 3, etc.)
# - First matching rule wins
# - Keywords use word boundary matching (won't match partial words)
# - All searches are case-insensitive

version: "1.0"
last_updated: "2026-01-23"

# Assignment Rules
rules:
  # Priority 1: PPL - Cloud Managed Services
  - keyword: "PPL"
    assignment_group: "Cloud Managed Services"
    priority: 1
    description: "Tickets mentioning PPL cloud resources or services"
    examples:
      - "PPL cloud access issue"
      - "User cannot connect to PPL VPN"
      - "PPL database timeout"
    
  # Priority 2: Odeon - Odeon Engineers
  - keyword: "Odeon"
    assignment_group: "Odeon Engineers"
    priority: 2
    description: "Tickets related to Odeon platform or systems"
    examples:
      - "Odeon system down"
      - "Cannot access Odeon portal"
      - "Odeon performance degradation"

  # Additional rules can be added below
  # Template:
  # - keyword: "KEYWORD"
  #   assignment_group: "Assignment Group Name"
  #   priority: 3
  #   description: "Description of what this rule handles"
  #   examples:
  #     - "Example ticket 1"
  #     - "Example ticket 2"

# Configuration Settings
settings:
  # Enable/disable rule processing
  enabled: true
  
  # Case sensitivity for keyword matching
  case_sensitive: false
  
  # Use word boundaries for keyword matching
  # If true: "PPL" matches "PPL cloud" but not "APPLE"
  # If false: "PPL" matches both "PPL cloud" and "APPLE"
  word_boundaries: true
  
  # Fields to search in tickets
  searchable_fields:
    - short_description
    - description
    - summary
    - comments
    - work_notes
    - close_notes
    - title
    - details
    - additional_comments
  
  # Default assignment group if no rules match
  default_assignment_group: null
  
  # Log matches for auditing
  log_matches: true

# Assignment Group Mappings
# Maps short names to full ServiceNow assignment group names
assignment_group_mappings:
  CMS: "Cloud Managed Services"
  ODEON: "Odeon Engineers"
  # Add more mappings as needed
  # NETWORK: "Network Operations Team"
  # DATABASE: "Database Administration"
  # SECURITY: "Security Operations Center"

# Rule Templates
# Uncomment and modify these templates to add new rules quickly
templates:
  # Network-related template
  # - keyword: "network"
  #   assignment_group: "Network Operations Team"
  #   priority: 3
  #   description: "Network connectivity and infrastructure issues"
  
  # Database-related template
  # - keyword: "database"
  #   assignment_group: "Database Administration"
  #   priority: 4
  #   description: "Database access, performance, and maintenance issues"
  
  # Security-related template
  # - keyword: "security"
  #   assignment_group: "Security Operations Center"
  #   priority: 5
  #   description: "Security incidents and access control issues"
  
  # Application-related template
  # - keyword: "SAP"
  #   assignment_group: "SAP Support Team"
  #   priority: 6
  #   description: "SAP application issues and support requests"

# Validation Rules
validation:
  # Maximum number of rules
  max_rules: 100
  
  # Require unique keywords
  unique_keywords: true
  
  # Require unique priorities
  unique_priorities: false
  
  # Minimum keyword length
  min_keyword_length: 2
  
  # Maximum keyword length
  max_keyword_length: 50

# Metadata
metadata:
  created_by: "AI Agent Implementation"
  created_date: "2026-01-23"
  version: "1.0"
  last_modified_by: "System"
  last_modified_date: "2026-01-23"
  
  # Change history
