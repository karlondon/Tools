version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gild3d-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-gild3duser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gild3dpass123}
      POSTGRES_DB: ${DB_NAME:-gild3d}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gild3d-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gild3duser} -d ${DB_NAME:-gild3d}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gild3d-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-gild3duser}:${DB_PASSWORD:-gild3dpass123}@postgres:5432/${DB_NAME:-gild3d}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_min32chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://gild3d.com}
      SITE_NAME: "Gilded Companions"
      SITE_URL: ${SITE_URL:-https://gild3d.com}
      # File uploads (local or S3)
      UPLOAD_PROVIDER: ${UPLOAD_PROVIDER:-local}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # Bitcoin payments via BTCPay Server
      BTCPAY_URL: ${BTCPAY_URL:-}
      BTCPAY_API_KEY: ${BTCPAY_API_KEY:-}
      BTCPAY_STORE_ID: ${BTCPAY_STORE_ID:-}
      BTCPAY_WEBHOOK_SECRET: ${BTCPAY_WEBHOOK_SECRET:-}
      # Email (optional — for notifications)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@gild3d.com}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gild3d-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gild3d-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://gild3d.com/api}
      NEXT_PUBLIC_SITE_NAME: "Gilded Companions"
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://gild3d.com}
      NEXT_PUBLIC_BTCPAY_URL: ${BTCPAY_URL:-}
    depends_on:
      - backend
    networks:
      - gild3d-network

  nginx:
    image: nginx:alpine
    container_name: gild3d-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
      - certbot_data:/var/www/certbot:ro
      - letsencrypt_data:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - gild3d-network

  # Certbot for free SSL (Let's Encrypt)
  certbot:
    image: certbot/certbot
    container_name: gild3d-certbot
    volumes:
      - certbot_data:/var/www/certbot
      - letsencrypt_data:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  uploads_data:
  certbot_data:
  letsencrypt_data:

networks:
  gild3d-network:
    driver: bridge