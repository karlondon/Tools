events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 22M;

    # Hide Nginx version from error pages and headers
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    # ── Real IP from Cloudflare ──────────────────────────────────────────────
    # Cloudflare forwards the real visitor IP in CF-Connecting-IP
    # These are Cloudflare's published IP ranges (update periodically)
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    # Auth endpoints — strict: 10 requests per minute
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    # API — moderate: 60 requests per minute
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    # Static/general — relaxed: 120 per minute
    limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;

    # Return 429 Too Many Requests instead of 503
    limit_req_status 429;

    upstream backend  { server backend:4000; }
    upstream frontend { server frontend:3000; }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name gild3d.com www.gild3d.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name gild3d.com www.gild3d.com;

        ssl_certificate     /etc/letsencrypt/live/gild3d.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gild3d.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_prefer_server_ciphers on;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options            "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options     "nosniff"                           always;
        add_header X-XSS-Protection           "1; mode=block"                     always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.nowpayments.io https://nowpayments.io; frame-src https://nowpayments.io; frame-ancestors 'none';" always;

        # ── Auth API — strict rate limiting ──────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30;
        }

        # ── General API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90;
        }

        # ── Uploads — served statically, no directory listing ────────────────
        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            autoindex off;
        }

        # ── Block common attack paths ─────────────────────────────────────────
        location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb)$ {
            return 403;
        }
        location ~ /\. {
            deny all;
        }

        # ── Frontend ──────────────────────────────────────────────────────────
        location / {
            limit_req zone=general burst=30 nodelay;
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
