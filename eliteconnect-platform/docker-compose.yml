version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eliteconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-eliteuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-elitepass123}
      POSTGRES_DB: ${DB_NAME:-eliteconnect}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eliteconnect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-eliteuser} -d ${DB_NAME:-eliteconnect}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eliteconnect-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-eliteuser}:${DB_PASSWORD:-elitepass123}@postgres:5432/${DB_NAME:-eliteconnect}
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eliteconnect-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eliteconnect-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-EliteConnect}
    depends_on:
      - backend
    networks:
      - eliteconnect-network

  nginx:
    image: nginx:alpine
    container_name: eliteconnect-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - frontend
      - backend
    networks:
      - eliteconnect-network

volumes:
  postgres_data:
  uploads_data:

networks:
  eliteconnect-network:
    driver: bridge