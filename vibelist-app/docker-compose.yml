services:
  postgres:
    image: postgres:16
    container_name: vibelist_postgres
    environment:
      POSTGRES_DB: vibelist
      POSTGRES_USER: vibelist
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build: ./backend
    container_name: vibelist_api
    environment:
      DATABASE_URL: postgres://vibelist:${POSTGRES_PASSWORD}@postgres:5432/vibelist
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_KEY: ${ADMIN_KEY}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_PLAN_ID: ${PAYPAL_PLAN_ID}
      PAYPAL_API: ${PAYPAL_API}
    depends_on:
      - postgres
    restart: always

  web:
    build: ./frontend
    container_name: vibelist_web
    depends_on:
      - api
    restart: always

  nginx:
    image: nginx:alpine
    container_name: vibelist_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./uploads:/var/www/uploads
      - ./certs:/etc/nginx/certs
    depends_on:
      - web
      - api
    restart: always